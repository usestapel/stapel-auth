name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install stapel-core
        run: pip install git+https://github.com/usestapel/stapel-core.git

      - name: Install stapel-gdpr
        run: pip install git+https://github.com/usestapel/stapel-gdpr.git

      - name: Install package with all extras
        run: pip install ".[all]"

      - name: Install test dependencies
        run: pip install pytest pytest-django pytest-cov

      - name: Lint
        run: |
          pip install ruff --quiet
          ruff check . --select E,F,W --ignore E501

      - name: Import check
        run: python -c "import stapel_auth; print('import OK')"

      - name: Tests with coverage
        run: |
          pytest tests.py tests_sso.py \
            --cov=stapel_auth \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          flags: stapel-auth
