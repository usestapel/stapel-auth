name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install stapel-core
        run: pip install git+https://github.com/usestapel/stapel-core.git

      - name: Install stapel-gdpr
        run: pip install git+https://github.com/usestapel/stapel-gdpr.git

      - name: Install package with all extras
        run: pip install ".[all]"

      - name: Install test dependencies
        run: pip install pytest pytest-django pytest-cov python3-openid

      - name: Lint
        run: |
          pip install ruff --quiet
          ruff check . --select E,F,W --ignore E501

      - name: Import check
        run: python -c "import stapel_auth; print('import OK')"

      - name: Tests with coverage
        run: |
          python -m pytest --pyargs stapel_auth.tests stapel_auth.tests_sso stapel_auth.tests_extra stapel_auth.tests_services \
            --cov=stapel_auth \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=junit.xml \
            -o junit_family=legacy \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ !cancelled() }}
        continue-on-error: true
        with:
          files: coverage.xml
          flags: stapel-auth
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        uses: codecov/test-results-action@v1
        if: ${{ !cancelled() }}
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
